<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký - Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .register-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 450px;
    }

    .register-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .register-header .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .register-header h2 {
      font-size: 28px;
      color: #2c3e50;
      margin: 0;
    }

    .register-header p {
      color: #7f8c8d;
      margin-top: 5px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: all 0.3s;
      font-family: inherit;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #4CAF50;
      box-shadow: 0 0 0 3px rgba(76,175,80,0.1);
    }

    .form-group p {
      margin-top: 8px;
    }

    .errorlist {
      background: #ffebee;
      border: 1px solid #ef5350;
      color: #c62828;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      list-style: none;
      margin-top: 6px;
    }

    .errorlist li {
      margin: 4px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76,175,80,0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .login-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 25px;
      border-top: 1px solid #e0e0e0;
    }

    .login-link p {
      margin: 0;
      color: #7f8c8d;
      font-size: 14px;
    }

    .login-link a {
      color: #4CAF50;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .login-link a:hover {
      color: #45a049;
      text-decoration: underline;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    @media (max-width: 480px) {
      .register-container {
        padding: 30px 20px;
      }

      .register-header h2 {
        font-size: 24px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="register-container">
    <div class="register-header">
      <div class="logo">📖</div>
      <h2>Tạo tài khoản</h2>
      <p>Tham gia cộng đồng Blog hiện đại</p>
    </div>

    <!-- Form đăng ký -->
    <form th:action="@{/register}" method="post" th:object="${user}">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Tên đăng nhập</label>
        <input type="text" id="username" th:field="*{username}" required>
        <ul th:if="${#fields.hasErrors('username')}" class="errorlist">
          <li th:each="err : ${#fields.errors('username')}" th:text="${err}"></li>
        </ul>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" th:field="*{password}" required>
        <ul th:if="${#fields.hasErrors('password')}" class="errorlist">
          <li th:each="err : ${#fields.errors('password')}" th:text="${err}"></li>
        </ul>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label for="confirmPassword">Xác nhận mật khẩu</label>
        <input type="password" id="confirmPassword" th:field="*{confirmPassword}" required>
        <ul th:if="${#fields.hasErrors('confirmPassword')}" class="errorlist">
          <li th:each="err : ${#fields.errors('confirmPassword')}" th:text="${err}"></li>
        </ul>
      </div>

      <!-- Name -->
      <div class="form-group">
        <label for="name">Họ và tên</label>
        <input type="text" id="name" th:field="*{name}" required>
        <ul th:if="${#fields.hasErrors('name')}" class="errorlist">
          <li th:each="err : ${#fields.errors('name')}" th:text="${err}"></li>
        </ul>
      </div>

      <!-- Gender & Birth -->
      <div class="form-row">
        <div class="form-group">
          <label for="gender">Giới tính</label>
          <select id="gender" th:field="*{gender}">
            <option value="">-- Chọn giới tính --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
          </select>
          <ul th:if="${#fields.hasErrors('gender')}" class="errorlist">
            <li th:each="err : ${#fields.errors('gender')}" th:text="${err}"></li>
          </ul>
        </div>

        <div class="form-group">
          <label for="birth">Ngày sinh</label>
          <input type="date" id="birth" th:field="*{birth}">
          <ul th:if="${#fields.hasErrors('birth')}" class="errorlist">
            <li th:each="err : ${#fields.errors('birth')}" th:text="${err}"></li>
          </ul>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" th:field="*{email}" required>
        <ul th:if="${#fields.hasErrors('email')}" class="errorlist">
          <li th:each="err : ${#fields.errors('email')}" th:text="${err}"></li>
        </ul>
      </div>

      <button type="submit">✓ Đăng ký ngay</button>
    </form>

    <!-- Link đăng nhập -->
    <div class="login-link">
      <p>Bạn đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
    </div>
  </div>
</body>

</html>
