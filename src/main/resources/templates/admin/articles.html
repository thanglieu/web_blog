<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Article</title>
</head>
<body>
    <h2>Quản lý Article</h2>

    <!-- Danh sách article -->
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Tiêu đề</th>
            <th>Tác giả</th>
            <th>Hành động</th>
        </tr>
        <tr th:each="article : ${articles}">
            <td th:text="${article.id}"></td>
            <td th:text="${article.title}"></td>
            <td th:text="${article.author.username}"></td>
            <td>
                <form th:action="@{/admin/articles/{id}/delete(id=${article.id})}" method="post">
                    <button type="submit">Xóa</button>
                </form>
            </td>
        </tr>
    </table>
</body>
</html>
