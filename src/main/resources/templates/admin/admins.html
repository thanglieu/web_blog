<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Admin</title>
</head>
<body>
    <h2>Quản lý Admin</h2>

    <!-- Danh sách admin -->
    <h3>Danh sách hiện tại</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Tên đăng nhập</th>
            <th>Email</th>
            <th>Hành động</th>
        </tr>
        <tr th:each="admin : ${admins}">
            <td th:text="${admin.id}"></td>
            <td th:text="${admin.username}"></td>
            <td th:text="${admin.email}"></td>
            <td>
                <form th:action="@{/admin/admins/{id}/delete(id=${admin.id})}" method="post">
                    <button type="submit">Xóa</button>
                </form>
            </td>
        </tr>
    </table>

    <!-- Thêm admin mới -->
    <h3>Thêm Admin mới</h3>
    <form th:action="@{/admin/admins}" method="post" th:object="${newAdmin}">
        <label for="username">Tên đăng nhập:</label>
        <input type="text" id="username" th:field="*{username}" required><br><br>

        <label for="password">Mật khẩu:</label>
        <input type="password" id="password" th:field="*{password}" required><br><br>

        <label for="name">Tên hiển thị:</label>
        <input type="text" id="name" th:field="*{name}" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" th:field="*{email}" required><br><br>

        <button type="submit">Thêm Admin</button>
    </form>
</body>
</html>
