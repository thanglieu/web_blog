<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Topic</title>
</head>
<body>
    <h2>Quản lý Topic</h2>

    <!-- Danh sách topic -->
    <h3>Danh sách hiện tại</h3>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Tên Topic</th>
            <th>Hành động</th>
        </tr>
        <tr th:each="topic : ${topics}">
            <td th:text="${topic.id}"></td>
            <td th:text="${topic.name}"></td>
            <td>
                <form th:action="@{/admin/topics/{id}/delete(id=${topic.id})}" method="post">
                    <button type="submit">Xóa</button>
                </form>
            </td>
        </tr>
    </table>

    <!-- Thêm topic mới -->
    <h3>Thêm Topic mới</h3>
    <form th:action="@{/admin/topics}" method="post" th:object="${newTopic}">
        <label for="name">Tên topic:</label>
        <input type="text" id="name" th:field="*{name}" required>
        <button type="submit">Thêm</button>
    </form>
</body>
</html>
